<!DOCTYPE html>
<html lang="en" >
    <head>
        <title>Loan Dashboard</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <div class="container py-4">
         <h1>Loan Admin Dashboard</h1>
        <div class="row g-4">
        <div class="col-md-4"><div class="card"><div class="card-body">
        <h6>Total Clients</h6><h2>{{ total }}</h2>
        </div></div></div>
        </div>
            <canvas id="loanChart" class="mt-5"></canvas>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script>
            new Chart(document.getElementById('loanChart'), {
            type:'bar',
            data:{labels:['Total Loans'],datasets:[{data:[{{ total_loans|default:0 }}]}]}
            });
        </script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <canvas id="loanChart"></canvas>
        <script>
            const ctx = document.getElementById('loanChart');
            new Chart(ctx, {
                type: 'bar',
            data: {
            labels: ['Clients'],
            datasets: [{ label: 'Total Clients', data: [{{ total_clients }}] }]
            }
            });
        </script>
    </body>
</html>
